name: Build, Push, and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    # Pre-baked runner with node, docker, and docker compose already installed.
    # Build once with: docker build -f Dockerfile.ci -t 192.168.1.50:3210/rappo/ci-runner:latest .
    # Then push: docker push 192.168.1.50:3210/rappo/ci-runner:latest
    runs-on: docker:192.168.1.50:3210/rappo/ci-runner:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Forgejo Registry
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login 192.168.1.50:3210 -u ${{ github.repository_owner }} --password-stdin

      - name: Build and Push
        run: |
          IMAGE="192.168.1.50:3210/${{ github.repository }}"
          # Pull the previous image for layer caching (ignore failure on first run)
          docker pull "${IMAGE}:latest" || true
          docker build \
            --cache-from "${IMAGE}:latest" \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:${{ github.sha }}" \
            .
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${{ github.sha }}"

      - name: Deploy
        run: |
          docker compose -f docker-compose.yml -p mediajam pull
          # Remove any pre-existing container not managed by this compose project
          docker stop mediajam 2>/dev/null || true
          docker rm mediajam 2>/dev/null || true
          docker compose -f docker-compose.yml -p mediajam up -d --force-recreate
          echo "✅ Deployed $(docker inspect --format='{{.Image}}' mediajam | cut -c1-12)"
