name: Build and Push Docker Image

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Docker CLI
        run: |
          if command -v apk &> /dev/null; then
            apk add --no-cache docker-cli
          elif command -v apt-get &> /dev/null; then
            apt-get update && apt-get install -y --no-install-recommends docker.io
          fi

      - name: Login to Forgejo Registry
        run: echo "${{ github.token }}" | docker login 192.168.1.50:3210 -u ${{ github.repository_owner }} --password-stdin

      - name: Build and Push
        run: |
          IMAGE="192.168.1.50:3210/${{ github.repository }}"
          docker build -t "${IMAGE}:latest" -t "${IMAGE}:${{ github.sha }}" .
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${{ github.sha }}"
