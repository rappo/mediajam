name: Build, Push, and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Docker CLI + Compose
        run: |
          if command -v apk &> /dev/null; then
            apk add --no-cache docker-cli docker-cli-compose
          elif command -v apt-get &> /dev/null; then
            apt-get update && apt-get install -y --no-install-recommends docker.io curl
            # Install docker compose v2 plugin manually (not in bullseye repos)
            mkdir -p /usr/local/lib/docker/cli-plugins
            curl -SL "https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64" \
              -o /usr/local/lib/docker/cli-plugins/docker-compose
            chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
          fi

      - name: Login to Forgejo Registry
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login 192.168.1.50:3210 -u ${{ github.repository_owner }} --password-stdin

      - name: Build and Push
        run: |
          IMAGE="192.168.1.50:3210/${{ github.repository }}"
          docker build -t "${IMAGE}:latest" -t "${IMAGE}:${{ github.sha }}" .
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${{ github.sha }}"

      - name: Deploy
        run: |
          docker compose -f docker-compose.yml -p mediajam pull
          # Remove any pre-existing container not managed by this compose project
          docker stop mediajam 2>/dev/null || true
          docker rm mediajam 2>/dev/null || true
          docker compose -f docker-compose.yml -p mediajam up -d --force-recreate
          echo "✅ Deployed $(docker inspect --format='{{.Image}}' mediajam | cut -c1-12)"
