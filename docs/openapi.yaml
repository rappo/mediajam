  /api/connections:
    get:
      tags: [Connections]
      summary: Find shortest path between two people, or search people
      description: |
        Two modes:
        - **Search**: `?search=name` returns matching people for autocomplete.
        - **Path**: `?from=personId&to=personId` returns the shortest connection chain via shared media.
      parameters:
        - name: search
          in: query
          schema: { type: string }
          description: Person name search query (autocomplete mode)
        - name: from
          in: query
          schema: { type: integer }
          description: Starting person ID (path mode)
        - name: to
          in: query
          schema: { type: integer }
          description: Target person ID (path mode)
      responses:
