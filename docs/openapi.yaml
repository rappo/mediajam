  # ── Backup & Restore ───────────────────────────────────────────
  /api/backup:
    get:
      tags: [Backup & Restore]
      summary: Export full database backup
      parameters:
        - name: includeImages
          in: query
          schema: { type: boolean, default: false }
      responses:
        '200':
          description: JSON file download
          content:
            application/json:
              schema:
                type: object

  /api/backup/import:
    post:
      tags: [Backup & Restore]
      summary: Import backup
      parameters:
        - name: includeImages
          in: query
          schema: { type: boolean, default: false }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /api/factory-reset:
    post:
      tags: [Backup & Restore]
      summary: Factory reset (destructive)
      description: Wipe the database and reset to fresh install state. Requires admin privileges. Server will restart after reset.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirmation]
              properties:
                confirmation: { type: string, enum: ['goodbye'] }
      responses:
        '200':
          description: Factory reset initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string, example: 'Factory reset complete. Server restarting...' }
        '400':
          description: Invalid confirmation phrase
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

