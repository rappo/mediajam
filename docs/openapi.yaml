      summary: Create API key (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, example: Home Assistant Widget }
                permissions:
                  type: array
                  items:
                    type: string
                    enum: ['read:media', 'write:media', 'read:sync', 'write:sync', admin]
                expiresAt: { type: string, format: date-time }
      responses:
        '201':
          description: Key created (full key shown only once)
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
                  name: { type: string }
                  key: { type: string, description: Only returned at creation }
