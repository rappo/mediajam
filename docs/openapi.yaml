      responses:
        '200':
          description: Audit file list
    post:
      tags: [Debug]
      summary: Run a data audit
      responses:
        '200':
          $ref: '#/components/responses/SSEStream'

  /api/audit/compare:
    post:
      tags: [Debug]
      summary: Compare two audit snapshots
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [before, after]
              properties:
                before: { type: string, description: Filename of the 'before' audit snapshot }
                after: { type: string, description: Filename of the 'after' audit snapshot }
      responses:
        '200':
          description: Audit comparison results
        '400':
          description: Missing before or after filenames

  /api/audit/{filename}:
    get:
      tags: [Debug]
      summary: Get a specific audit file
      parameters:
        - name: filename
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Audit file contents

  # ── Arr Wanted ──────────────────────────────────────────────────
  /api/arr/wanted:
    get:
      tags: [Arr Integration]
      summary: Get wanted/missing items from *arr services
      description: |
        Fetch all missing/wanted items from configured Sonarr, Radarr, and Lidarr services.
        Includes download queue status, failure info, and cutoff-unmet items.
        Results are cached for 2 minutes with stale-while-revalidate.
      parameters:
        - name: includeCutoff
          in: query
          schema: { type: string, enum: ['0', '1'], default: '0' }
          description: Set to 1 to include cutoff-unmet items
        - name: refresh
          in: query
          schema: { type: string, enum: ['0', '1'], default: '0' }
          description: Set to 1 to force a fresh fetch
      responses:
        '200':
          description: Wanted items grouped by series/movie/artist
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        service: { type: string, enum: [sonarr, radarr, lidarr] }
                        type: { type: string, enum: [show, movie, artist] }
                        title: { type: string }
                        year: { type: integer, nullable: true }
                        arrId: { type: integer }
                        mediaParentId: { type: integer, nullable: true }
                        slug: { type: string, nullable: true }
                        poster_url: { type: string, nullable: true }
                        reason: { type: string, enum: [in_queue, failed, not_available, not_out_yet, cutoff_unmet] }
                        reasonLabel: { type: string }
                        missingCount: { type: integer }
                        episodes:
                          type: array
                          items:
                            type: object
                            properties:
                              label: { type: string }
                              title: { type: string }
                              airDate: { type: string, format: date-time, nullable: true }
                              isAired: { type: boolean }
                  summary:
                    type: object
                    properties:
                      total: { type: integer }
                      totalItems: { type: integer }
                      byReason: { type: object, additionalProperties: { type: integer } }
                      byService: { type: object, additionalProperties: { type: integer } }
                  cached: { type: boolean }
                  refreshing: { type: boolean }
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ── Page Data ───────────────────────────────────────────────────
  /api/pages/dashboard:
    get:
      tags: [Page Data]
      summary: Dashboard page data
      description: |
        Returns all data needed to render the dashboard: greeting, stats, watchlist,
        upcoming calendar, trending movies/shows, recommendations, actor deep dive,
        hot albums, and recently added items. Supports lazy-loading individual sections.
      parameters:
        - name: calendarDays
          in: query
          schema: { type: integer, default: 7 }
          description: Number of days for upcoming calendar
        - name: calendarTypes
          in: query
          schema: { type: string }
          description: Comma-separated media types (movie,show,artist). Defaults to app settings.
        - name: trendingMoviePage
          in: query
          schema: { type: integer, default: 1 }
        - name: trendingShowPage
          in: query
          schema: { type: integer, default: 1 }
        - name: section
          in: query
          schema: { type: string, enum: [trendingMovies, trendingShows] }
          description: Load a specific section only (for lazy loading / pagination)
      responses:
        '200':
          description: Dashboard data
          content:
            application/json:
              schema:
                type: object
                properties:
                  greeting: { type: string }
                  stats: { type: object }
                  watchlist: { type: array, items: { type: object } }
                  upcoming: { type: array, items: { type: object } }
                  trendingMovies: { type: object }
                  trendingShows: { type: object }
                  recommended: { type: object }
                  actorDeepDive: { type: object, nullable: true }
                  hotAlbums: { type: array, items: { type: object } }
                  recentlyAdded: { type: array, items: { type: object } }

  /api/pages/calendar-month:
    get:
      tags: [Page Data, Calendar]
      summary: Monthly calendar view
      description: Returns calendar data for a specific month, grouped by day.
      parameters:
        - name: year
          in: query
          schema: { type: integer }
          description: Calendar year (defaults to current year)
        - name: month
          in: query
          schema: { type: integer, minimum: 1, maximum: 12 }
          description: Calendar month 1-12 (defaults to current month)
        - name: calendarTypes
          in: query
          schema: { type: string }
          description: Comma-separated media types (movie,show,artist). Defaults to app settings.
      responses:
        '200':
          description: Monthly calendar days
          content:
            application/json:
              schema:
                type: object
                properties:
                  days:
                    type: array
                    items:
                      type: object
  /api/pages/movies:
    get:
      tags: [Page Data]
      summary: Movies page server data
      responses:
        '200':
          description: Movies with filtering and sorting

  /api/pages/tv:
    get:
      tags: [Page Data]
      summary: TV shows page server data
      responses:
        '200':
          description: TV shows with filtering and sorting

  /api/pages/music:
    get:
      tags: [Page Data]
      summary: Music page server data
      responses:
        '200':
          description: Artists and albums with filtering

  /api/pages/stats:
    get:
      tags: [Page Data]
      summary: Stats page server data
      responses:
        '200':
          description: Dashboard statistics

  /api/pages/history:
    get:
      tags: [Page Data]
      summary: History page server data
      responses:
        '200':
          description: Playback history with pagination

  # ── API Docs ────────────────────────────────────────────────────
  /api/docs:
    get:
      tags: [Settings]
      summary: Swagger UI for API documentation
      security: []
      responses:
        '200':
          description: HTML page with Swagger UI

  /api/docs/openapi.yaml:
    get:
      tags: [Settings]
      summary: OpenAPI specification file
      security: []
      responses:
        '200':
          description: YAML OpenAPI spec
          content:
            text/yaml:
              schema:
                type: string

# ══════════════════════════════════════════════════════════════════
# Components
# ══════════════════════════════════════════════════════════════════
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: mjsession
    bearerApiKey:
      type: http
      scheme: bearer
      description: 'API key prefixed with `mj_`. Create via POST /api/api-keys.'

  parameters:
    MediaId:
      name: id
      in: path
      required: true
      schema: { type: integer }
      description: media_parents.id
    UserId:
      name: userId
      in: path
      required: true
      schema: { type: integer }
    ArrService:
      name: service
      in: path
      required: true
      schema: { type: string, enum: [radarr, sonarr, lidarr] }

  responses:
    Success:
      description: Operation successful
      content:
        application/json:
          schema:
            type: object
            properties:
              success: { type: boolean, example: true }
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Admin privileges required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    SSEStream:
      description: Server-Sent Events stream
      content:
        text/event-stream:
          schema:
            type: string
            description: 'SSE events: `data: {"type":"progress",...}` and `data: {"type":"complete",...}`'

  schemas:
    Error:
      type: object
      properties:
        error: { type: string }

    SessionUser:
      type: object
      properties:
        id: { type: integer }
        username: { type: string }
        isAdmin: { type: boolean }

    SearchResults:
      type: object
      properties:
        query: { type: string }
        results:
          type: object
          properties:
            shows: { type: array, items: { $ref: '#/components/schemas/SearchItem' } }
            movies: { type: array, items: { $ref: '#/components/schemas/SearchItem' } }
            music: { type: array, items: { $ref: '#/components/schemas/SearchItem' } }
            albums: { type: array, items: { $ref: '#/components/schemas/SearchItem' } }
            people: { type: array, items: { $ref: '#/components/schemas/SearchItem' } }
            children: { type: array, items: { $ref: '#/components/schemas/SearchItem' } }
            history: { type: array, items: { $ref: '#/components/schemas/SearchItem' } }
            semantic: { type: array, items: { $ref: '#/components/schemas/SearchItem' } }
        totalCount: { type: integer }

    SearchItem:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        poster_url: { type: string, nullable: true }
        release_year: { type: integer, nullable: true }
        type: { type: string }
        item_title: { type: string }
        parent_title: { type: string }
        parent_id: { type: integer }
        episode_count: { type: integer }
        album_count: { type: integer }
        credit_count: { type: integer }

    HistoryEntry:
      type: object
      properties:
        id: { type: integer }
        timestamp: { type: string, format: date-time }
        duration_consumed_seconds: { type: integer }
        completion_pct: { type: number }
        source: { type: string }
        item_title: { type: string }
        season_number: { type: integer, nullable: true }
        item_number: { type: integer, nullable: true }
        parent_title: { type: string }
        media_type: { type: string, enum: [movie, show, artist] }
        poster_url: { type: string, nullable: true }
        username: { type: string }

    HistoryResponse:
      type: object
      properties:
        entries: { type: array, items: { $ref: '#/components/schemas/HistoryEntry' } }
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        totalPages: { type: integer }

    Activity:
      type: object
      properties:
        id: { type: integer }
        type: { type: string }
        message: { type: string }
        timestamp: { type: string, format: date-time }
        read: { type: boolean }

    Rating:
      type: object
      properties:
        source: { type: string }
        rating_type: { type: string, enum: [audience, critic] }
        value: { type: number }
        vote_count: { type: integer, nullable: true }
        raw_value: { type: string }

    UserStats:
      type: object
      properties:
        userId: { type: integer }
        collection:
          type: object
          properties:
            shows: { type: integer }
            movies: { type: integer }
            artists: { type: integer }
            collectedItems: { type: integer }
            totalRuntimeHours: { type: number }
        playback:
          type: object
          properties:
            totalPlays: { type: integer }
            uniqueItemsPlayed: { type: integer }
            totalPlayedHours: { type: number }
            firstPlay: { type: string, format: date-time }
            lastPlay: { type: string, format: date-time }
        topItems:
          type: array
          items:
            type: object
            properties:
              parent_title: { type: string }
              item_title: { type: string }
              media_type: { type: string }
              play_count: { type: integer }

    FavoriteItem:
      type: object
      properties:
        parent_id: { type: integer }
        parent_title: { type: string }
        media_type: { type: string }
        poster_url: { type: string, nullable: true }
        play_count: { type: integer }
        total_seconds: { type: integer }
        last_played: { type: string, format: date-time }

    NowPlaying:
      type: object
      properties:
        userId: { type: integer }
        playing: { type: boolean }
        sessions:
          type: array
          items:
            type: object
            properties:
              session_id: { type: integer }
              title: { type: string }
              media_type: { type: string }
              progress_ticks: { type: integer }
              runtime_ticks: { type: integer }
              started_at: { type: string, format: date-time }
              is_paused: { type: boolean }
              progress_pct: { type: number }

    AskResponse:
      type: object
      properties:
        question: { type: string }
        type: { type: string, enum: [data, chat] }
        sql: { type: string, description: Only present for data queries }
        results: { type: array, items: { type: object } }
        count: { type: integer }
        summary: { type: string }

    Settings:
      type: object
      properties:
        jellyfinUrl: { type: string }
        theme: { type: string }
        includeSpecials: { type: boolean }
        setupComplete: { type: boolean }
        tvdbApiKey: { type: string, description: Masked as •••••••• }
        tmdbApiKey: { type: string, description: Masked as •••••••• }
        omdbApiKey: { type: string, description: Masked as •••••••• }
        discogsToken: { type: string, description: Masked as •••••••• }
        fanartApiKey: { type: string, description: Masked as •••••••• }
        radarrUrl: { type: string }
        radarrApiKey: { type: string, description: Masked as •••••••• }
        sonarrUrl: { type: string }
        lidarrUrl: { type: string }
        lidarrApiKey: { type: string, description: Masked as •••••••• }
        heartBorderMovies: { type: boolean }

    SettingsUpdate:
      type: object
      description: Only provided fields are updated.
      properties:
        jellyfin_url: { type: string }
        theme: { type: string }
        tvdb_api_key: { type: string }
        tmdb_api_key: { type: string }
        musicbrainz_api_key: { type: string }
        include_specials: { type: boolean }
        trakt_client_id: { type: string }
        trakt_client_secret: { type: string }
        lastfm_api_key: { type: string }
        lastfm_shared_secret: { type: string }
        jellyfin_pr_db_path: { type: string }
        jellyfin_sync_check: { type: string }
        ollama_url: { type: string }
        ollama_embed_model: { type: string }
        ollama_chat_model: { type: string }
        radarr_url: { type: string }
        radarr_api_key: { type: string }
        radarr_external_url: { type: string }
        sonarr_url: { type: string }
        sonarr_api_key: { type: string }
        sonarr_external_url: { type: string }
        lidarr_url: { type: string }
        lidarr_api_key: { type: string }
        lidarr_external_url: { type: string }
        omdb_api_key: { type: string }
        discogs_token: { type: string }
        fanart_api_key: { type: string }
        heart_border_movies: { type: boolean }
        heart_border_shows: { type: boolean }
        heart_border_music: { type: boolean }
        heart_border_people: { type: boolean }

    ApiKey:
      type: object
      properties:
        id: { type: integer }
