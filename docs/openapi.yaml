openapi: 3.0.3
info:
  title: Mediajam API
  description: Media library management and playback tracking API. Integrates with Jellyfin, TMDB, MusicBrainz, *arr services, Trakt, Last.fm, and more.
  version: 0.0.1
  license:
    name: MIT

servers:
  - url: http://localhost:7331
    description: Default local development

security:
  - sessionCookie: []
  - bearerApiKey: []

tags:
  - name: Authentication
    description: Login, logout, and password management
  - name: Search
    description: Global search across all media types
  - name: Media
    description: Media item management (movies, shows, artists)
  - name: Favorites & Watchlist
    description: Favorite and watchlist management
  - name: Playback History
    description: Playback history timeline
  - name: Activity
    description: Activity feed and notifications
  - name: Ratings
    description: External ratings from IMDb, Rotten Tomatoes, etc.
  - name: Stats
    description: Playback statistics
  - name: Users
    description: Public user endpoints (unauthenticated)
  - name: Ask
    description: Natural language queries via Ollama
  - name: Settings
    description: Application configuration
  - name: Image Proxy
    description: Image proxying and caching
  - name: Sync
    description: Jellyfin library sync and backfill
  - name: Enrichment
    description: Metadata enrichment from external sources
  - name: AI / Ollama
    description: Ollama connectivity, embeddings, and tagging
  - name: Arr Integration
    description: Radarr, Sonarr, and Lidarr integration
  - name: Spokes
    description: Trakt and Last.fm integration
  - name: Discovery
    description: Discover and add new media
  - name: Ingest
    description: Jellyfin webhook and now-playing SSE
  - name: API Keys
    description: API key management
  - name: Backup & Restore
    description: Database backup, import, and factory reset
  - name: Tracks
    description: Music album tracks
  - name: Recommendations
    description: Personalized media recommendations
  - name: Debug
    description: Debug and diagnostic endpoints
  - name: User Preferences
    description: Per-user preference management
  - name: Auto Sync
    description: Automatic sync scheduling
  - name: Jellyfin Remote
    description: Remote control of Jellyfin players
  - name: Album Matching
    description: Album matching against external databases
  - name: Conflicts
    description: Data conflict resolution
  - name: Connections
    description: Six Degrees of Separation — shortest path between people
  - name: Calendar
    description: Upcoming and recently released media
  - name: Pipeline
    description: Automated sync pipeline
  - name: Setup
    description: Initial application setup wizard
  - name: LLM Integration
    description: Gemini and OpenAI LLM connectivity
  - name: Page Data
    description: Server-side page data endpoints

paths:
  # ── Authentication ──────────────────────────────────────────────
  /api/auth/login:
    post:
      tags: [Authentication]
      summary: Log in
      description: Authenticate and receive an `mjsession` cookie. Supports local password and Jellyfin-delegated auth.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string, example: admin }
                password: { type: string, example: yourpassword }
      responses:
        '200':
          description: Login successful
          headers:
            Set-Cookie:
              schema: { type: string, example: 'mjsession=abc123; Path=/; HttpOnly' }
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  user:
                    $ref: '#/components/schemas/SessionUser'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/logout:
    post:
      tags: [Authentication]
      summary: Log out
      description: Clear the session cookie.
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /api/auth/reset-password:
    post:
      tags: [Authentication]
      summary: Reset a user's password (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, newPassword]
              properties:
                userId: { type: integer }
                newPassword: { type: string }
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ── Search ──────────────────────────────────────────────────────
  /api/search:
    get:
      tags: [Search]
      summary: Global search
      description: Search across movies, shows, artists, albums, people, episodes, and playback history. Includes semantic search when embeddings are available.
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string, minLength: 2 }
          description: Search query (min 2 chars)
      responses:
        '200':
          description: Search results grouped by type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResults'

  # ── Media Management ────────────────────────────────────────────
  /api/media/{id}:
    patch:
      tags: [Media]
      summary: Correct an external ID or image URL
      description: |
        Update a field on a media item. When correcting an external ID (tmdb_id, imdb_id, musicbrainz_id),
        if another record already has that ID, the two records are automatically merged.
      parameters:
        - $ref: '#/components/parameters/MediaId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [field, value]
              properties:
                field:
                  type: string
                  enum: [musicbrainz_id, tmdb_id, imdb_id, backdrop_url, poster_url]
                value:
                  oneOf:
                    - type: string
                    - type: 'null'
      responses:
        '200':
          description: Update applied (possibly merged)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  merged: { type: boolean }
                  mergedId: { type: integer }
    delete:
      tags: [Media]
      summary: Delete a media item
      description: Remove a media item and all related data. Returns an undo token valid for 30 seconds.
      parameters:
        - $ref: '#/components/parameters/MediaId'
      responses:
        '200':
          description: Deleted with undo token
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  title: { type: string }
                  undoToken: { type: string }
                  route: { type: string }
    post:
      tags: [Media]
      summary: Undo delete
      description: Restore a previously deleted media item using the undo token.
      parameters:
        - $ref: '#/components/parameters/MediaId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [undoToken]
              properties:
                undoToken: { type: string }
      responses:
        '200':
          description: Restored
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  id: { type: integer }
                  title: { type: string }
                  route: { type: string }

  /api/media/child/{id}:
    patch:
      tags: [Media]
      summary: Update a child item
      description: Update an episode, album, or track. Supports watch_status, is_collected, and musicbrainz_id fields.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [field, value]
              properties:
                field:
                  type: string
                  enum: [watch_status, is_collected, musicbrainz_id]
                value: {}
      responses:
        '200':
          $ref: '#/components/responses/Success'
    delete:
      tags: [Media]
      summary: Delete a child item
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: undo
          in: query
          schema: { type: boolean }
          description: Set to true to restore (with undoToken in body)
      responses:
        '200':
          $ref: '#/components/responses/Success'

  # ── Favorites & Watchlist ───────────────────────────────────────
  /api/favorite:
    post:
      tags: [Favorites & Watchlist]
      summary: Toggle favorite
      description: Toggle favorite status on a media item or person. Bidirectional sync with Jellyfin.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, id, isFavorite]
              properties:
                type: { type: string, enum: [media, person] }
                id: { type: integer }
                isFavorite: { type: boolean }
      responses:
        '200':
          description: Favorite toggled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  type: { type: string }
                  id: { type: integer }
                  isFavorite: { type: boolean }

  /api/watchlist:
    get:
      tags: [Favorites & Watchlist]
      summary: Get user's watchlist
      description: Return the current user's watchlist with media details, ordered by most recently added.
      responses:
        '200':
          description: Watchlist items
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        title: { type: string }
                        poster_url: { type: string, nullable: true }
                        backdrop_url: { type: string, nullable: true }
                        media_type: { type: string, enum: [movie, show, artist] }
                        slug: { type: string, nullable: true }
                        release_year: { type: integer, nullable: true }
                        overview: { type: string, nullable: true }
                        added_at: { type: string, format: date-time }
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Favorites & Watchlist]
      summary: Toggle watchlist
      description: Toggle a media item on/off the user's watchlist.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mediaParentId]
              properties:
                mediaParentId: { type: integer }
      responses:
        '200':
          description: Watchlist toggled
          content:
            application/json:
              schema:
                type: object
                properties:
                  inWatchlist: { type: boolean }

  # ── Playback History ────────────────────────────────────────────
  /api/history:
    get:
      tags: [Playback History]
      summary: Get playback history
      description: Paginated playback history timeline for the authenticated user.
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 200 }
        - name: type
          in: query
          schema: { type: string, enum: [show, movie, artist] }
      responses:
        '200':
          description: Paginated history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryResponse'

  /api/playback-history/{id}:
    delete:
      tags: [Playback History]
      summary: Delete a playback history entry
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          $ref: '#/components/responses/Success'

  # ── Activity Feed ───────────────────────────────────────────────
  /api/activity:
    get:
      tags: [Activity]
      summary: Get activity log
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: unreadOnly
          in: query
          schema: { type: boolean, default: false }
      responses:
        '200':
          description: Activity entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  activities:
                    type: array
                    items:
                      $ref: '#/components/schemas/Activity'
                  unreadCount: { type: integer }
    put:
      tags: [Activity]
      summary: Mark activities as read
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  oneOf:
                    - type: integer
                    - type: string
                      enum: ['all']
      responses:
        '200':
          $ref: '#/components/responses/Success'
    delete:
      tags: [Activity]
      summary: Clear read activity entries
      responses:
        '200':
          description: Cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  deleted: { type: integer }
                  activities: { type: array, items: { $ref: '#/components/schemas/Activity' } }
                  unreadCount: { type: integer }

  # ── Ratings ─────────────────────────────────────────────────────
  /api/ratings:
    get:
      tags: [Ratings]
      summary: Get cached external ratings
      parameters:
        - name: mediaParentId
          in: query
          schema: { type: integer }
        - name: mediaChildId
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: External ratings
          content:
            application/json:
              schema:
                type: object
                properties:
                  ratings:
                    type: array
                    items:
                      $ref: '#/components/schemas/Rating'
    post:
      tags: [Ratings]
      summary: Fetch fresh external ratings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mediaParentId: { type: integer }
                mediaChildId: { type: integer }
                refresh: { type: boolean }
      responses:
        '200':
          description: Ratings fetched
          content:
            application/json:
              schema:
                type: object
                properties:
                  ratings:
                    type: array
                    items:
                      $ref: '#/components/schemas/Rating'

  # ── Stats ───────────────────────────────────────────────────────
  /api/stats:
    get:
      tags: [Stats]
      summary: Get playback stats for an item
      parameters:
        - name: type
          in: query
          required: true
          schema: { type: string, enum: [track, album, artist, movie, show] }
        - name: id
          in: query
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Playback stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  type: { type: string }
                  id: { type: integer }
                  play_count: { type: integer }
                  last_played: { type: string, format: date-time }
                  first_played: { type: string, format: date-time }

  # ── User Endpoints (Public) ────────────────────────────────────
  /api/users/{userId}/stats:
    get:
      tags: [Users]
      summary: User collection and playback stats
      security: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserStats'

  /api/users/{userId}/history:
    get:
      tags: [Users]
      summary: User playback history
      security: []
      parameters:
        - $ref: '#/components/parameters/UserId'
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 200 }
        - name: type
          in: query
          schema: { type: string, enum: [show, movie, artist] }
      responses:
        '200':
          description: Paginated history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryResponse'

  /api/users/{userId}/favorites:
    get:
      tags: [Users]
      summary: Most-played items ranked by play count
      security: []
      parameters:
        - $ref: '#/components/parameters/UserId'
        - name: type
          in: query
          schema: { type: string, enum: [show, movie, artist] }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        '200':
          description: Top played items
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId: { type: integer }
                  favorites:
                    type: array
                    items:
                      $ref: '#/components/schemas/FavoriteItem'

  /api/users/{userId}/now-playing:
    get:
      tags: [Users]
      summary: Active playback sessions
      security: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Now playing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NowPlaying'

  /api/users/{userId}/recommendations/next-by-director:
    get:
      tags: [Recommendations]
      summary: Unwatched movies by a director, actor, or other credited person
      description: |
        Returns unwatched, owned movies credited to a given person, sorted by Rotten Tomatoes score.
        If no person is specified, auto-detects from the user's last watched movie.
        Supports filtering by role type (director, actor, writer, producer, composer).
      parameters:
        - $ref: '#/components/parameters/UserId'
        - name: person
          in: query
          description: Fuzzy name search (e.g. "kurosawa", "tom hanks")
          schema: { type: string }
        - name: personId
          in: query
          description: Exact person ID for direct lookup
          schema: { type: integer }
        - name: role
          in: query
          description: Filter by credit role type
          schema: { type: string, enum: [director, actor, writer, producer, composer, any], default: director }
        - name: limit
          in: query
          schema: { type: integer, default: 5, maximum: 25 }
      responses:
        '200':
          description: Recommendation results
          content:
            application/json:
              schema:
                type: object
                properties:
                  person:
                    type: object
                    nullable: true
                    properties:
                      id: { type: integer }
                      name: { type: string }
                      role: { type: string }
                  lastWatched:
                    type: object
                    nullable: true
                    properties:
                      title: { type: string }
                      release_year: { type: integer }
                      watchedAt: { type: string, format: date-time }
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        title: { type: string }
                        release_year: { type: integer }
                        rt_score: { type: number, nullable: true }
                        rt_raw: { type: string, nullable: true }
                        poster_url: { type: string }
                        slug: { type: string }
                        href: { type: string }
                        role: { type: string }
                        reason: { type: string }
                  totalUnwatched: { type: integer }
        '401':
          description: Unauthorized

  # ── Natural Language Queries ────────────────────────────────────
  /api/ask:
    post:
      tags: [Ask]
      summary: Ask a natural language question
      description: Chat with your media library using natural language. Uses Ollama LLM for text-to-SQL and conversational responses.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question]
              properties:
                question: { type: string, example: 'What movies did I watch this week?' }
      responses:
        '200':
          description: Query result (data or chat)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AskResponse'
        '503':
          description: Ollama not configured

  # ── Settings ────────────────────────────────────────────────────
  /api/settings:
    get:
      tags: [Settings]
      summary: Get app settings
      description: Returns current settings. API keys are masked.
      responses:
        '200':
          description: Current settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Settings'
    put:
      tags: [Settings]
      summary: Update app settings
      description: Only provided fields are updated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettingsUpdate'
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /api/settings/validate:
    post:
      tags: [Settings]
      summary: Test Jellyfin connectivity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url: { type: string, format: uri }
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /api/settings/validate-pr-db:
    post:
      tags: [Settings]
      summary: Validate playback reporting DB path
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path: { type: string }
      responses:
        '200':
          $ref: '#/components/responses/Success'

  # ── Image Proxy ─────────────────────────────────────────────────
  /api/image:
    get:
      tags: [Image Proxy]
      summary: Proxy and cache an external image
      description: Avoids CORS/ORB issues. 24h Cache-Control. Allowed sources include TMDB, TVDB, CoverArtArchive, Discogs, Fanart, Jellyfin, and localhost.
      security: []
      parameters:
        - name: url
          in: query
          required: true
          schema: { type: string, format: uri }
          description: URL-encoded image URL to proxy
      responses:
        '200':
          description: Image bytes
          content:
            image/*:
              schema:
                type: string
                format: binary

  /api/icons/{service}:
    get:
      tags: [Image Proxy]
      summary: Get a service icon
      security: []
      parameters:
        - name: service
          in: path
          required: true
          schema: { type: string, enum: [tmdb, tvdb, musicbrainz, discogs, fanart] }
      responses:
        '200':
          description: SVG icon (30-day cache)
          content:
            image/svg+xml:
              schema:
                type: string

  # ── Sync & Backfill ─────────────────────────────────────────────
  /api/sync:
    post:
      tags: [Sync]
      summary: Start Jellyfin library sync
      description: Returns an SSE stream of progress events.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                libraryId: { type: string }
                libraryName: { type: string }
      responses:
        '200':
          $ref: '#/components/responses/SSEStream'
    get:
      tags: [Sync]
      summary: Monitor active sync operations (SSE)
      responses:
        '200':
          $ref: '#/components/responses/SSEStream'

  /api/sync/status:
    get:
      tags: [Sync]
      summary: Get sync status for all libraries
      responses:
        '200':
          description: Sync status
          content:
            application/json:
              schema:
                type: object
                properties:
                  syncing: { type: boolean }
                  libraries:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        name: { type: string }
                        status: { type: string }
                        progress: { type: integer }

  /api/sync/item:
    post:
      tags: [Sync]
      summary: Sync or enrich a single media item
      description: |
        Three enrichment modes:
        1. **Jellyfin sync** — provide `jellyfinId` to re-fetch all data from Jellyfin (episodes, albums, people, Wikipedia).
        2. **TMDb enrichment** — provide `mediaParentId` + `tmdbId` to enrich a stub (no Jellyfin) with TMDb metadata and credits.
        3. **MusicBrainz enrichment** — provide `mediaParentId` + `musicbrainzId` to sync band members and Wikipedia for an artist stub.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                jellyfinId:
                  type: string
                  description: Jellyfin item ID (mode 1)
                mediaParentId:
                  type: integer
                  description: Local media_parents ID (modes 2 & 3)
                tmdbId:
                  type: string
                  description: TMDb ID for enrichment (mode 2)
                musicbrainzId:
                  type: string
                  description: MusicBrainz artist ID for enrichment (mode 3)
      responses:
        '200':
          description: Sync/enrichment result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  childCount: { type: integer }
                  parent: { type: string }
                  type: { type: string, enum: [movie, show, artist] }
                  episodes: { type: integer }
                  albums: { type: integer }
                  people: { type: integer }
                  members: { type: integer }
                  source: { type: string, enum: [tmdb, musicbrainz] }
                  wikipedia: { type: string }
        '400':
          description: Missing parameters or service not configured
        '404':
          description: Item not found

  /api/sync/people-ids:
    post:
      tags: [Sync]
      summary: Sync TMDB person IDs
      responses:
        '200':
          $ref: '#/components/responses/SSEStream'

  /api/sync/reconcile:
    post:
      tags: [Sync]
      summary: Run reconciliation
      responses:
        '200':
          $ref: '#/components/responses/SSEStream'

  /api/backfill:
    post:
      tags: [Sync]
      summary: TMDB enrichment backfill
      description: Enrich all media parents with overview, poster, and release year from TMDB.
      responses:
        '200':
          $ref: '#/components/responses/SSEStream'

  /api/backfill/backdrops:
    post:
      tags: [Sync]
