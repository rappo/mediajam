# Mediajam Docker Compose
# Pull from Forgejo container registry (built by CI)
# Or use `docker compose build` for local builds
services:
  mediajam:
    image: 192.168.1.50:3210/rappo/mediajam:latest
    # build: .  # uncomment for local builds
    container_name: mediajam
    ports:
      - "7331:7331"
    volumes:
      # Persistent storage for Mediajam's SQLite database
      - /mnt/user/appdata/mediajam:/app/data
      # Optional: Mount Jellyfin's Playback Reporting DB (read-only)
      # - /path/to/jellyfin/data/playback_reporting.db:/app/jellyfin/playback_reporting.db:ro
    environment:
      - PORT=7331
      - HOST=0.0.0.0
      - ORIGIN=http://localhost:7331
      # - DATABASE_PATH=/app/data/mediajam.sqlite
    restart: unless-stopped
