# Mediajam Docker Compose
# Pull from GitHub Container Registry (built by CI on every push)
# Or use `docker compose build` for local builds
services:
  mediajam:
    image: ghcr.io/rappo/mediajam:latest
    # build: .  # uncomment for local builds
    container_name: mediajam
    ports:
      - 7331:7331
      # MCP server (enable in Admin Settings → Server → MCP Server)
      # - 7332:7332
    volumes:
      # Persistent storage for Mediajam's SQLite database
      - /mnt/cache/appdata/mediajam:/app/data
      # Image cache (disposable, can be rebuilt)
      - /mnt/cache/appdata/mediajam/cache:/app/cache
      # Optional: Mount Jellyfin's Playback Reporting DB (read-only)
      - /mnt/user/appdata/jellyfin/data/data/playback_reporting.db:/app/jellyfin/playback_reporting.db:ro
    environment:
      - PORT=7331
      - HOST=0.0.0.0
      - ORIGIN=http://192.168.1.50:7331
      - BODY_SIZE_LIMIT=Infinity
      - TZ=America/New_York
    restart: unless-stopped
    networks:
      - media-network
      - infra-bridge
networks:
  media-network:
    name: media-network
    external: true
  infra-bridge:
    external: true
