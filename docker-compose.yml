# Mediajam Docker Compose
# Use `docker compose build` for local builds, or pull from your container registry
services:
  mediajam:
    build: .
    # image: your-registry/mediajam:latest  # uncomment for pre-built images
    container_name: mediajam
    ports:
      - 7331:7331
    volumes:
      # Persistent storage for Mediajam's SQLite database
      - ./data:/app/data
      # Image cache (disposable, can be rebuilt)
      - ./cache:/app/cache
      # Optional: Mount Jellyfin's Playback Reporting DB (read-only)
      # - /path/to/jellyfin/data/playback_reporting.db:/app/jellyfin/playback_reporting.db:ro
    environment:
      - PORT=7331
      - HOST=0.0.0.0
      - ORIGIN=http://localhost:7331  # Change to your server's URL
      - BODY_SIZE_LIMIT=Infinity
      - TZ=America/New_York
    restart: unless-stopped
